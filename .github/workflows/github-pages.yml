# Builds sik-radio-tools and deploys index.html + dist/ to GitHub Pages.
# Enable: Settings → Pages → Source: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sik-radio-tools/package-lock.json

      - name: Install and build
        working-directory: sik-radio-tools
        run: |
          npm ci
          npm run build

      - name: Prepare site
        working-directory: sik-radio-tools
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r dist _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sik-radio-tools/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
